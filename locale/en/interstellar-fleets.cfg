[technology-description]
interstellar-fleets=Unlock interstellar labs, dust collectors, and stellar fusion drives for deep-space fleets beyond Promethium.
quantum-replication=Convert interstellar dust into raw materials and promethium chunks aboard space platforms.
antimatter-containment=Replicate and safely contain antimatter for high-output interstellar propulsion.
interstellar-xenobiology=Replicate biological crops, bioflux, biter eggs, and pentapod eggs from interstellar dust.
quantum-fabrication=Replicate advanced construction parts needed to keep deep-space industry self-sufficient.
orbital-industry=Rebuild planet-specialized production machines as space-safe interstellar variants.
fleet-printing=Consolidate identical ships into one simulated fleet, then split them back out when needed.
interstellar-dust-crushing=Crush interstellar dust in asteroid crushers, recovering some dust and occasionally exposing metallic, carbonic, oxide, or promethium asteroid chunks.
deep-dust-prospecting=Improve asteroid-crusher dust processing with stronger asteroid chunk and promethium yields.
stellar-fusion-drive-efficiency=Improves stellar fusion drive fuel efficiency, reducing fusion power cell consumption for fleet boosts by 8% per level, to a minimum of 20% of the base cost.
antimatter-drive-efficiency=Improves antimatter drive fuel efficiency, reducing antimatter consumption for fleet boosts by 10% per level, to a minimum of 20% of the base cost.
interstellar-dust-collection-productivity=Increases scripted interstellar dust output from dust collectors by 8% per level.
quantum-replication-productivity=Adds 4% productivity per level to quantum replication recipes.
fleet-coordination=Improves the production speed bonus from consolidated fleet size by 3% per level without increasing the fleet-size power penalty.

[item-description]
interstellar-dust=Sparse exotic matter gathered by deep-space fleets near interstellar routes.
ship-starter-pack=A compressed construction package consumed when merging one identical platform into a fleet.
antimatter=An ultra-dense exotic fuel replicated from large quantities of interstellar dust and fusion power cells.
interstellar-lab=An endgame lab whose output scales with fleet size on consolidated platforms.
quantum-replicator=Converts interstellar dust into selected raw resources and antimatter using extreme power.
interstellar-dust-collector=Harvests interstellar dust from deep-space platform routes.
stellar-fusion-drive=A blue-glow relativistic drive that consumes fusion power cells to accelerate interstellar fleets.
antimatter-drive=A purple high-output drive that consumes antimatter for stronger fleet acceleration.
interstellar-foundry=A space-safe foundry rebuilt for interstellar platform metallurgy.
interstellar-electromagnetic-plant=A space-safe electromagnetic plant rebuilt for interstellar platform electronics.
interstellar-biochamber=A space-safe biochamber rebuilt for interstellar platform biological production.
interstellar-cryogenic-plant=A space-safe cryogenic plant rebuilt for interstellar platform cryogenic production.

